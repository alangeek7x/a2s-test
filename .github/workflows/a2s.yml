name: A2S Query Test

on:
  workflow_dispatch:  # run manually with a button click

jobs:
  test:
    runs-on: ubuntu-latest  # this runs in USA (Azure East US)

    steps:
      - name: Show location
        run: curl -s ipinfo.io

      - name: Run A2S query
        run: |
          python3 - << 'EOF'
          import socket, time

          SERVER_IP   = "95.135.0.140
          SERVER_PORT = 27015
          TIMEOUT_SEC = 5.0
          REPEATS     = 5

          A2S_INFO_PAYLOAD = b"\xff\xff\xff\xffTSource Engine Query\x00"

          def hex_dump(data, bytes_per_row=16):
              lines = []
              for i in range(0, len(data), bytes_per_row):
                  chunk = data[i:i+bytes_per_row]
                  hex_part = " ".join(f"{b:02X}" for b in chunk)
                  ascii_part = "".join(chr(b) if 32 <= b < 127 else "." for b in chunk)
                  lines.append(f"  {i:04X}  {hex_part:<{bytes_per_row*3}}  |{ascii_part}|")
              return "\n".join(lines)

          def parse_a2s_info(data):
              info = {}
              try:
                  resp_type = data[4]
                  if resp_type == 0x6D:
                      info["engine"] = "GoldSrc (CS 1.6 ✓)"
                      offset = 5
                      fields = []
                      for _ in range(5):
                          end = data.index(b"\x00", offset)
                          fields.append(data[offset:end].decode("utf-8", errors="replace"))
                          offset = end + 1
                      info["server_name"] = fields[1]
                      info["map"]         = fields[2]
                      if offset + 2 <= len(data):
                          info["players"]     = data[offset]
                          info["max_players"] = data[offset+1]
                  elif resp_type == 0x49:
                      info["engine"] = "Source Engine"
              except Exception as e:
                  info["error"] = str(e)
              return info

          latencies = []
          last_response = None

          with socket.socket(socket.AF_INET, socket.SOCK_DGRAM) as sock:
              sock.settimeout(TIMEOUT_SEC)
              for i in range(1, REPEATS+1):
                  try:
                      sock.sendto(A2S_INFO_PAYLOAD, (SERVER_IP, SERVER_PORT))
                      t0 = time.perf_counter()
                      data, _ = sock.recvfrom(4096)
                      ms = (time.perf_counter() - t0) * 1000
                      latencies.append(ms)
                      last_response = data
                      print(f"  Ping #{i}: {ms:.3f} ms  ({len(data)} bytes)")
                  except socket.timeout:
                      print(f"  Ping #{i}: TIMEOUT")
                  time.sleep(0.3)

          if latencies:
              print(f"\n  Min: {min(latencies):.3f} ms")
              print(f"  Avg: {sum(latencies)/len(latencies):.3f} ms")
              print(f"  Max: {max(latencies):.3f} ms")

          if last_response:
              print(f"\n--- Hex Dump ---")
              print(hex_dump(last_response))
              print(f"\n--- Parsed ---")
              for k, v in parse_a2s_info(last_response).items():
                  print(f"  {k}: {v}")
          EOF
